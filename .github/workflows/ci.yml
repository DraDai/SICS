name: 🚀 Spring Boot CI/CD

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

# 1. 设置必要权限
permissions:
  contents: read
  packages: write
  id-token: write # 必需，用于与k8s集群认证

# 2. 定义环境变量，方便管理（特别是镜像标签）
env:
  REGISTRY: ghcr.io
  # 关键：使用 toLowerCase() 函数确保全小写
  IMAGE_NAME_PREFIX: 'dradai'
  REPO_NAME: 'sics'

jobs:
  # Job 1: 构建、测试所有服务
  build-and-test:
    strategy:
      matrix:
        # 这里是关键：定义你的微服务列表。未来新增服务，只需在这里添加一行。
        service: [ 'user-service', 'auth-service']
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
      - name: 🔨 安装所有基础模块
        run: |
          mvn clean install -DskipTests -Dspring-boot.repackage.skip=true
      - name: 📦 单独打包可执行的starter模块
        run: |
          mvn clean package -pl ${{ matrix.service }}/${{ matrix.service }}-starter -am -DskipTests
      - name: 上传JAR文件作为artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.service }}-jar
          path: ${{ matrix.service }}/${{ matrix.service }}-starter/target/*.jar

  # Job 2: 为每个微服务构建并推送Docker镜像到GHCR
  build-and-push-image:
    needs: build-and-test # 依赖构建Job
    runs-on: ubuntu-latest
    strategy:
      matrix:
        # 这里是关键：定义你的微服务列表。未来新增服务，只需在这里添加一行。
        service: ['user-service', 'auth-service']
    steps:
      - uses: actions/checkout@v4
        # 1️⃣ 下载 JAR 文件（关键补充）
      - name: 📥 下载 ${{ matrix.service }} JAR文件
        uses: actions/download-artifact@v4
        with:
          name: ${{ matrix.service }}-jar
          path: ${{ matrix.service }}/${{ matrix.service }}-starter/target/

        # 2️⃣ 验证 JAR 文件存在
      - name: 🔍 验证JAR文件
        run: |
          echo "=== 下载的JAR文件 ==="
          ls -la ${{ matrix.service }}/${{ matrix.service }}-starter/target/
          if [ -f ${{ matrix.service }}/${{ matrix.service }}-starter/target/*.jar ]; then
            echo "✅ JAR文件下载成功"
          else
            echo "❌ JAR文件不存在"
            exit 1
          fi
      - name: 🐳 设置Docker Buildx
        uses: docker/setup-buildx-action@v3
      - name: 🔐 登录GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }} # 使用GitHub自动生成的令牌，无需手动设置
      - name: 🏗️ 构建镜像并推送到GHCR
        uses: docker/build-push-action@v5
        with:
          context: ./${{ matrix.service }}/${{ matrix.service }}-starter  # 指向Dockerfile所在的具体子目录
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME_PREFIX }}/${{ env.REPO_NAME }}/${{ matrix.service }}:latest
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME_PREFIX }}/${{ env.REPO_NAME }}/${{ matrix.service }}:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # Job 3: 部署到你的k3s集群（以更新user-service为例）
  deploy-to-k3s:
    needs: build-and-push-image # 依赖镜像推送Job
    # 通常只在推送到main分支时自动部署，可根据需要调整
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    steps:
      - name: 🪣 获取k3s集群config文件
        run: echo "${{ secrets.KUBE_CONFIG }}" > kubeconfig.yaml
      - name: 🛠️ 安装kubectl
        uses: azure/setup-kubectl@v3
        with:
          version: 'latest'
      - name: 🚀 更新镜像
        # 更新k3s集群中指定Deployment的镜像，触发滚动更新
        run: |
          export KUBECONFIG=kubeconfig.yaml
          kubectl set image deployment/user-service-deployment \
            user-service-container=${{ env.REGISTRY }}/${{ env.IMAGE_NAME_PREFIX }}/${{ env.REPO_NAME }}/user-service:${{ github.sha }} \
            --namespace=default
